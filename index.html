<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>תרגול אנטומיה ב׳ — בטן, אגן, גף תחתון</title>
<style>
  :root {
    --bg: #0f1420;
    --panel: #161d2e;
    --panel-2: #1d2740;
    --border: #2a3550;
    --text: #e8ecf7;
    --text-dim: #9aa5c0;
    --accent: #5b8cff;
    --accent-2: #7c5cff;
    --good: #34c77b;
    --good-bg: rgba(52,199,123,0.12);
    --bad: #ff5c72;
    --bad-bg: rgba(255,92,114,0.12);
    --warn: #f0b429;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Arial Hebrew", Arial, sans-serif;
    background: radial-gradient(1200px 800px at 20% -10%, #1b2440 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100vh;
  }
  #root { min-height: 100vh; }
  .app {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 18px 60px;
  }
  header.top {
    text-align: center;
    margin-bottom: 22px;
  }
  header.top h1 {
    font-size: 1.5rem;
    margin: 0 0 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header.top p { color: var(--text-dim); margin: 0; font-size: 0.9rem; }

  .card {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }

  /* Setup screen */
  .topic-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin: 18px 0;
  }
  .topic-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .topic-row:hover { border-color: var(--accent); }
  .topic-row.checked { border-color: var(--accent); background: rgba(91,140,255,0.08); }
  .topic-row .label { display: flex; align-items: center; gap: 12px; font-size: 1.02rem; }
  .topic-row .count { color: var(--text-dim); font-size: 0.85rem; }
  .checkbox {
    width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .topic-row.checked .checkbox { background: var(--accent); border-color: var(--accent); }
  .checkbox svg { width: 13px; height: 13px; display: none; }
  .topic-row.checked .checkbox svg { display: block; }

  .row-inline { display: flex; align-items: center; gap: 10px; margin: 14px 0; flex-wrap: wrap; }
  select, .num-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.95rem;
  }

  button.primary {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: #fff; border: none; border-radius: 10px;
    padding: 13px 20px; font-size: 1rem; font-weight: 600;
    cursor: pointer; width: 100%; margin-top: 8px;
    transition: transform .1s, opacity .15s;
  }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary:not(:disabled):hover { transform: translateY(-1px); }
  button.secondary {
    background: transparent; color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 18px; font-size: 0.92rem; cursor: pointer;
  }
  button.secondary:hover { border-color: var(--accent); }
  button.linklike {
    background: none; border: none; color: var(--accent);
    cursor: pointer; font-size: 0.9rem; padding: 4px 0; text-decoration: underline;
  }

  /* Quiz screen */
  .progress-wrap {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .progress-bar {
    flex: 1; height: 8px; border-radius: 5px; background: rgba(255,255,255,0.07); overflow: hidden;
  }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .25s; }
  .progress-text { font-size: 0.85rem; color: var(--text-dim); white-space: nowrap; }
  .score-chip {
    font-size: 0.82rem; color: var(--text-dim); background: rgba(255,255,255,0.05);
    border-radius: 999px; padding: 4px 12px; white-space: nowrap;
  }

  .topic-tag {
    display: inline-block; font-size: 0.75rem; color: var(--accent);
    background: rgba(91,140,255,0.12); border-radius: 999px; padding: 3px 10px; margin-bottom: 10px;
  }
  .question-text { font-size: 1.15rem; line-height: 1.6; margin: 0 0 18px; white-space: pre-wrap; }

  .option {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    font-size: 0.98rem;
    line-height: 1.5;
    transition: border-color .12s, background .12s;
  }
  .option:hover:not(.locked) { border-color: var(--accent); }
  .option .bullet {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; color: var(--text-dim);
  }
  .option.correct { border-color: var(--good); background: var(--good-bg); }
  .option.correct .bullet { border-color: var(--good); background: var(--good); color: #06210f; }
  .option.incorrect { border-color: var(--bad); background: var(--bad-bg); }
  .option.incorrect .bullet { border-color: var(--bad); background: var(--bad); color: #2a0509; }
  .option.dim { opacity: 0.55; }
  .option.locked { cursor: default; }
  .option.selected-neutral { border-color: var(--accent); background: rgba(91,140,255,0.10); }
  .option.selected-neutral .bullet { border-color: var(--accent); background: var(--accent); color: #fff; }

  .feedback-box {
    margin-top: 16px; padding: 16px; border-radius: 10px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.03);
  }
  .feedback-box.good { border-color: var(--good); }
  .feedback-box.bad { border-color: var(--bad); }
  .feedback-title { font-weight: 700; margin-bottom: 6px; font-size: 0.95rem; }
  .feedback-title.good { color: var(--good); }
  .feedback-title.bad { color: var(--bad); }
  .explanation-text { color: var(--text); font-size: 0.92rem; line-height: 1.55; margin: 0 0 10px; }

  .ref-box {
    margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 10px;
    font-size: 0.86rem; color: var(--text-dim);
  }
  .ref-box b { color: var(--text); }

  .nav-row { display: flex; gap: 10px; margin-top: 18px; }
  .nav-row button { flex: 1; width: auto; margin-top: 0; }
  .nav-row button.secondary:disabled { opacity: 0.35; cursor: not-allowed; }
  .finish-early-row { text-align: center; margin-top: 10px; }
  .mode-note { color: var(--text-dim); font-size: 0.82rem; margin: 6px 0 0; line-height: 1.5; }

  /* Results screen */
  .big-score { text-align: center; margin: 8px 0 20px; }
  .big-score .pct { font-size: 2.6rem; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .big-score .sub { color: var(--text-dim); font-size: 0.95rem; margin-top: 4px; }

  .missed-item {
    border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
    background: rgba(255,255,255,0.02);
  }
  .missed-item .q { font-size: 0.95rem; margin-bottom: 8px; }
  .missed-item .ans-line { font-size: 0.85rem; margin-bottom: 3px; }
  .missed-item .ans-line.your { color: var(--bad); }
  .missed-item .ans-line.correct { color: var(--good); }
  .missed-item .ref { font-size: 0.8rem; color: var(--text-dim); margin-top: 6px; }

  footer.note {
    text-align: center; color: var(--text-dim); font-size: 0.78rem; margin-top: 26px; line-height: 1.6;
  }
  .kbd { font-size: 0.7rem; border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="data_abdomen.js"></script>
<script src="data_pelvis.js"></script>
<script src="data_lowerlimb.js"></script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/plain" id="app-source">
const { useState, useMemo, useEffect } = React;

const TOPICS = [
  { key: "abdomen", label: "בטן (Abdomen)", data: window.QUESTIONS_ABDOMEN || [] },
  { key: "pelvis", label: "אגן ופרינאום (Pelvis)", data: window.QUESTIONS_PELVIS || [] },
  { key: "lowerlimb", label: "גף תחתון (Lower Limb)", data: window.QUESTIONS_LOWERLIMB || [] },
];

// Order of blocks in the simulated exam, per the real exam structure: pelvis, then abdomen, then lower limb.
const EXAM_BLOCK_ORDER = ["pelvis", "abdomen", "lowerlimb"];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildExamSimulation(perTopic) {
  let pool = [];
  EXAM_BLOCK_ORDER.forEach(key => {
    const topic = TOPICS.find(t => t.key === key);
    if (!topic) return;
    const block = shuffle(topic.data).slice(0, Math.min(perTopic, topic.data.length));
    pool = pool.concat(block);
  });
  return pool;
}

function CheckIcon() {
  return <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}

function ModeSelect({ value, onChange }) {
  return (
    <select value={value} onChange={e => onChange(e.target.value)}>
      <option value="test">מצב מבחן — בלי משוב עד הסוף</option>
      <option value="practice">תרגול עם משוב מיידי</option>
    </select>
  );
}

function SetupScreen({ onStart }) {
  const [examPerTopic, setExamPerTopic] = useState("20");
  const [examMode, setExamMode] = useState("test");
  const [showCustom, setShowCustom] = useState(false);

  const [checked, setChecked] = useState({ abdomen: true, pelvis: true, lowerlimb: true });
  const [count, setCount] = useState("all");
  const [order, setOrder] = useState("shuffle");
  const [customMode, setCustomMode] = useState("practice");

  const totalAvailable = TOPICS.reduce((sum, t) => checked[t.key] ? sum + t.data.length : sum, 0);
  const grandTotal = TOPICS.reduce((sum, t) => sum + t.data.length, 0);
  const perTopicNum = parseInt(examPerTopic, 10);
  const examTotal = EXAM_BLOCK_ORDER.reduce((sum, key) => {
    const t = TOPICS.find(x => x.key === key);
    return sum + Math.min(perTopicNum, t ? t.data.length : 0);
  }, 0);

  function toggle(key) {
    setChecked(prev => ({ ...prev, [key]: !prev[key] }));
  }

  function startExam() {
    onStart(buildExamSimulation(perTopicNum), examMode);
  }

  function startCustom() {
    let pool = [];
    if (order === "byTopic") {
      EXAM_BLOCK_ORDER.forEach(key => {
        const t = TOPICS.find(x => x.key === key);
        if (t && checked[t.key]) pool = pool.concat(shuffle(t.data));
      });
    } else {
      TOPICS.forEach(t => { if (checked[t.key]) pool = pool.concat(t.data); });
      if (order === "shuffle") pool = shuffle(pool);
    }
    if (count !== "all") {
      const n = parseInt(count, 10);
      pool = pool.slice(0, n);
    }
    onStart(pool, customMode);
  }

  return (
    <div>
      <div className="card">
        <h2 style={{margin: "0 0 6px", fontSize: "1.15rem"}}>מבחן לדוגמה</h2>
        <p style={{color: "var(--text-dim)", fontSize: "0.9rem", lineHeight: 1.6, margin: "0 0 16px"}}>
          מדמה את מבנה המבחן האמיתי — {examTotal} שאלות ברצף לפי נושאים: {examPerTopic} אגן ← {examPerTopic} בטן ← {examPerTopic} גף תחתון.
          השאלות נבחרות אקראית בכל הרצה מתוך מאגר של {grandTotal} שאלות, כך שאפשר להריץ מבחנים חוזרים בלי שיחזרו על עצמם.
        </p>

        <div className="row-inline">
          <label style={{color: "var(--text-dim)", fontSize: "0.9rem"}}>מספר שאלות מכל נושא:</label>
          <select value={examPerTopic} onChange={e => setExamPerTopic(e.target.value)}>
            <option value="10">10 (30 בסה"כ)</option>
            <option value="15">15 (45 בסה"כ)</option>
            <option value="20">20 (60 בסה"כ — כמו במבחן האמיתי)</option>
            <option value="25">25 (75 בסה"כ)</option>
          </select>

          <label style={{color: "var(--text-dim)", fontSize: "0.9rem", marginRight: "6px"}}>מצב:</label>
          <ModeSelect value={examMode} onChange={setExamMode} />
        </div>
        <p className="mode-note">
          {examMode === "test"
            ? "במצב מבחן לא תראו אם ענית נכון עד שתסיימו — בדיוק כמו במבחן אמיתי. אפשר לנווט קדימה ואחורה בין השאלות בכל שלב."
            : "במצב תרגול תראו מיד אחרי כל שאלה אם ענית נכון, עם הסבר והפניה לסיכום."}
        </p>

        <button className="primary" onClick={startExam}>
          התחל מבחן לדוגמה ({examTotal} שאלות)
        </button>
      </div>

      <div style={{textAlign: "center", margin: "16px 0"}}>
        <button className="linklike" onClick={() => setShowCustom(s => !s)}>
          {showCustom ? "הסתר התאמה אישית ‹" : "או: התאמה אישית של תרגול ›"}
        </button>
      </div>

      {showCustom && (
        <div className="card">
          <div className="topic-grid">
            {TOPICS.map(t => (
              <div key={t.key} className={"topic-row" + (checked[t.key] ? " checked" : "")} onClick={() => toggle(t.key)}>
                <div className="label">
                  <div className="checkbox"><CheckIcon /></div>
                  <span>{t.label}</span>
                </div>
                <span className="count">{t.data.length} שאלות</span>
              </div>
            ))}
          </div>

          <div className="row-inline">
            <label style={{color: "var(--text-dim)", fontSize: "0.9rem"}}>מספר שאלות:</label>
            <select value={count} onChange={e => setCount(e.target.value)}>
              <option value="all">כל השאלות הזמינות ({totalAvailable})</option>
              <option value="10">10</option>
              <option value="15">15</option>
              <option value="20">20</option>
              <option value="30">30</option>
              <option value="50">50</option>
            </select>

            <label style={{color: "var(--text-dim)", fontSize: "0.9rem", marginRight: "6px"}}>סדר:</label>
            <select value={order} onChange={e => setOrder(e.target.value)}>
              <option value="shuffle">מעורבב לגמרי</option>
              <option value="byTopic">מקובץ לפי נושא (בלי ערבוב בין נושאים)</option>
              <option value="ordered">לפי סדר הסיכום</option>
            </select>

            <label style={{color: "var(--text-dim)", fontSize: "0.9rem", marginRight: "6px"}}>מצב:</label>
            <ModeSelect value={customMode} onChange={setCustomMode} />
          </div>

          <button className="primary" disabled={totalAvailable === 0} onClick={startCustom}>
            {totalAvailable === 0 ? "בחר לפחות נושא אחד" : "התחל תרגול (" + (count === "all" ? totalAvailable : Math.min(parseInt(count,10), totalAvailable)) + " שאלות)"}
          </button>
        </div>
      )}
    </div>
  );
}

function Option({ opt, idx, isSelected, isCorrect, revealMode, clickable, onPick }) {
  let cls = "option";
  if (revealMode) {
    cls += " locked";
    if (isCorrect) cls += " correct";
    else if (isSelected) cls += " incorrect";
    else cls += " dim";
  } else {
    if (!clickable) cls += " locked";
    if (isSelected) cls += " selected-neutral";
  }
  const letters = ["א", "ב", "ג", "ד"];
  return (
    <div className={cls} onClick={() => clickable && onPick(idx)}>
      <div className="bullet">
        {revealMode && isCorrect ? <CheckIcon/> : revealMode && isSelected ? "✕" : letters[idx]}
      </div>
      <div>{opt}</div>
    </div>
  );
}

function QuizScreen({ questions, mode, onFinish }) {
  const [i, setI] = useState(0);
  const [answers, setAnswers] = useState(() => Array(questions.length).fill(null));
  const [refShown, setRefShown] = useState(() => Array(questions.length).fill(false));

  const q = questions[i];
  const selected = answers[i];
  const answered = selected !== null && selected !== undefined;
  const revealMode = mode === "practice" && answered;
  const clickable = !(mode === "practice" && answered);

  function pick(idx) {
    if (!clickable) return;
    setAnswers(prev => {
      const next = prev.slice();
      next[i] = idx;
      return next;
    });
  }

  function buildResults() {
    return questions.map((qq, idx) => ({
      q: qq,
      selected: answers[idx] === undefined ? null : answers[idx],
      correct: answers[idx] === qq.correctIndex,
    }));
  }

  function goPrev() {
    if (i > 0) setI(i - 1);
  }

  function goNext() {
    if (i + 1 < questions.length) {
      setI(i + 1);
    } else {
      onFinish(buildResults());
    }
  }

  function finishNow() {
    onFinish(buildResults());
  }

  function showRefForCurrent() {
    setRefShown(prev => {
      const next = prev.slice();
      next[i] = true;
      return next;
    });
  }

  const answeredCount = answers.filter(a => a !== null && a !== undefined).length;
  const correctSoFar = mode === "practice"
    ? answers.filter((a, idx) => a === questions[idx].correctIndex).length
    : 0;

  return (
    <div className="card">
      <div className="progress-wrap">
        <span className="progress-text">{i + 1} / {questions.length}</span>
        <div className="progress-bar"><div className="progress-fill" style={{width: ((i)/questions.length*100) + "%"}}/></div>
        {mode === "practice" ? (
          <span className="score-chip">✓ {correctSoFar}</span>
        ) : (
          <span className="score-chip">נענו {answeredCount}/{questions.length}</span>
        )}
      </div>

      <div className="topic-tag">{q.topic}</div>
      <p className="question-text">{q.question}</p>

      {q.options.map((opt, idx) => (
        <Option
          key={idx}
          opt={opt}
          idx={idx}
          isSelected={idx === selected}
          isCorrect={idx === q.correctIndex}
          revealMode={revealMode}
          clickable={clickable}
          onPick={pick}
        />
      ))}

      {revealMode && (
        <div className={"feedback-box " + (selected === q.correctIndex ? "good" : "bad")}>
          <div className={"feedback-title " + (selected === q.correctIndex ? "good" : "bad")}>
            {selected === q.correctIndex ? "✓ תשובה נכונה" : "✕ תשובה שגויה"}
          </div>
          <p className="explanation-text">{q.explanation}</p>
          {!refShown[i] ? (
            <button className="linklike" onClick={showRefForCurrent}>הצג הפניה למקור בסיכום ›</button>
          ) : (
            <div className="ref-box">
              📄 <b>{q.reference.doc}</b> — עמוד <b>{q.reference.page}</b> — נושא: <b>{q.reference.section}</b>
              <div style={{marginTop:"4px"}}>עיין/י בעמוד זה בקובץ המקורי כדי לחזור על החומר.</div>
            </div>
          )}
        </div>
      )}

      <div className="nav-row">
        <button className="secondary" disabled={i === 0} onClick={goPrev}>→ הקודמת</button>
        <button className="primary" onClick={goNext}>
          {i + 1 >= questions.length ? "סיים וראה תוצאות" : "הבאה ←"}
        </button>
      </div>
      {i + 1 < questions.length && (
        <div className="finish-early-row">
          <button className="linklike" onClick={finishNow}>סיים עכשיו וראה תוצאות ›</button>
        </div>
      )}
    </div>
  );
}

function ResultsScreen({ results, onRestartAll, onRetryMissed }) {
  const total = results.length;
  const correct = results.filter(r => r.correct).length;
  const pct = total ? Math.round((correct / total) * 100) : 0;
  const missed = results.filter(r => !r.correct);

  return (
    <div className="card">
      <div className="big-score">
        <div className="pct">{pct}%</div>
        <div className="sub">{correct} מתוך {total} תשובות נכונות</div>
      </div>

      <div className="row-inline" style={{justifyContent: "center", width: "100%"}}>
        <button className="secondary" onClick={onRestartAll}>התחל תרגול חדש</button>
        {missed.length > 0 && (
          <button className="secondary" onClick={() => onRetryMissed(missed.map(m => m.q))}>תרגל מחדש רק את השאלות שטעית בהן ({missed.length})</button>
        )}
      </div>

      {missed.length > 0 && (
        <div style={{marginTop: "22px"}}>
          <h3 style={{fontSize: "1rem", color: "var(--text-dim)", marginBottom: "12px"}}>שאלות שטעית בהן — לחזרה:</h3>
          {missed.map((m, idx) => (
            <div className="missed-item" key={idx}>
              <div className="topic-tag">{m.q.topic}</div>
              <div className="q">{m.q.question}</div>
              <div className="ans-line your">התשובה שלך: {m.selected !== null ? m.q.options[m.selected] : "(לא נענה)"}</div>
              <div className="ans-line correct">התשובה הנכונה: {m.q.options[m.q.correctIndex]}</div>
              <div className="ref">📄 {m.q.reference.doc} — עמוד {m.q.reference.page} — {m.q.reference.section}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("setup"); // setup | quiz | results
  const [activeQuestions, setActiveQuestions] = useState([]);
  const [activeMode, setActiveMode] = useState("practice");
  const [finalResults, setFinalResults] = useState([]);

  function startQuiz(pool, mode) {
    setActiveQuestions(pool);
    setActiveMode(mode || "practice");
    setScreen("quiz");
  }
  function finishQuiz(results) {
    setFinalResults(results);
    setScreen("results");
  }
  function restartAll() {
    setScreen("setup");
  }
  function retryMissed(qs) {
    setActiveQuestions(shuffle(qs));
    setActiveMode("practice");
    setScreen("quiz");
  }

  const totalQs = TOPICS.reduce((s,t) => s + t.data.length, 0);

  return (
    <div className="app">
      <header className="top">
        <h1>תרגול אנטומיה ב׳</h1>
        <p>בטן · אגן ופרינאום · גף תחתון — {totalQs} שאלות תרגול ברמת מבחן, עם הפניה לסיכום</p>
      </header>

      {screen === "setup" && <SetupScreen onStart={startQuiz} />}
      {screen === "quiz" && <QuizScreen questions={activeQuestions} mode={activeMode} onFinish={finishQuiz} />}
      {screen === "results" && <ResultsScreen results={finalResults} onRestartAll={restartAll} onRetryMissed={retryMissed} />}

      <footer className="note">
        השאלות נוצרו על בסיס הסיכומים ומבחני העבר שסופקו, לצורך תרגול בלבד.<br/>
        בכל טעות — לחצו על "הצג הפניה למקור בסיכום" כדי לדעת בדיוק מה לחזור עליו.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
